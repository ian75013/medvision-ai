stages:
  download_data:
    cmd: python -m src.data.download_brain_mri_dataset --config configs/brain_tumor_mri.yaml
    deps:
      - src/data/download_brain_mri_dataset.py
      - configs/brain_tumor_mri.yaml
    outs:
      - data/raw/brain_tumor_mri

  train_brain_mri:
    cmd: python -m src.training.train_brain_mri --config configs/brain_tumor_mri.yaml --model ${brain_mri.model_type} --epochs ${brain_mri.epochs}
    deps:
      - src/training/train_brain_mri.py
      - src/utils/dataset_multiclass.py
      - src/evaluation/metrics_multiclass.py
      - configs/brain_tumor_mri.yaml
      - data/raw/brain_tumor_mri
    params:
      - brain_mri.seed
      - brain_mri.image_size
      - brain_mri.batch_size
      - brain_mri.epochs
      - brain_mri.learning_rate
      - brain_mri.validation_split
      - brain_mri.model_type
    outs:
      - artifacts/models/brain_mri_optimized.keras
    metrics:
      - artifacts/reports/brain_mri_metrics.json:
          cache: false
    plots:
      - artifacts/reports/brain_mri_history.json:
          x: epoch
          y:
            - accuracy
            - val_accuracy
            - loss
            - val_loss
