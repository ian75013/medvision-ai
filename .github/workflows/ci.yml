name: CI

on:
  push:
    branches: [ main, master, dev, feature-segmentation ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-ci.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_api.py tests/test_metrics.py tests/test_preprocessing.py