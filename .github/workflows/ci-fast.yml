name: CI Fast

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  fast-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            requirements/base.txt
            requirements/ci-fast.txt

      - name: Install fast dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/ci-fast.txt

      - name: Run lightweight tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_metrics.py tests/test_preprocessing.py
