# MedVision production reverse proxy example (Apache2)
#
# Usage:
# 1) Copy this file to /etc/apache2/sites-available/medvision-ai-ssl.conf
# 2) Replace all placeholders (__LIKE_THIS__)
# 3) Enable required modules and site:
#      sudo a2enmod proxy proxy_http proxy_wstunnel headers ssl rewrite
#      sudo a2ensite medvision-ai-ssl.conf
#      sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Optional HTTP site for redirect:
#   /etc/apache2/sites-available/medvision-ai.conf
#   <VirtualHost *:80>
#     ServerName __APP_DOMAIN__
#     Redirect permanent / https://__APP_DOMAIN__/
#   </VirtualHost>
#   <VirtualHost *:80>
#     ServerName __API_DOMAIN__
#     Redirect permanent / https://__API_DOMAIN__/
#   </VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName __API_DOMAIN__

    ErrorLog  ${APACHE_LOG_DIR}/medvision-api-error.log
    CustomLog ${APACHE_LOG_DIR}/medvision-api-access.log combined

    SSLEngine on
    SSLCertificateFile __API_SSL_CERT__
    SSLCertificateKeyFile __API_SSL_KEY__
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyTimeout 3600

    # FastAPI backend
    ProxyPass        / http://127.0.0.1:__API_HOST_PORT__/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:__API_HOST_PORT__/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>

<VirtualHost *:443>
    ServerName __APP_DOMAIN__

    ErrorLog  ${APACHE_LOG_DIR}/medvision-app-error.log
    CustomLog ${APACHE_LOG_DIR}/medvision-app-access.log combined

    SSLEngine on
    SSLCertificateFile __APP_SSL_CERT__
    SSLCertificateKeyFile __APP_SSL_KEY__
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyTimeout 3600

    # Streamlit websocket endpoint
    ProxyPass        /_stcore/stream ws://127.0.0.1:__APP_HOST_PORT__/_stcore/stream retry=0 timeout=3600
    ProxyPassReverse /_stcore/stream ws://127.0.0.1:__APP_HOST_PORT__/_stcore/stream

    # Streamlit HTTP traffic
    ProxyPass        / http://127.0.0.1:__APP_HOST_PORT__/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:__APP_HOST_PORT__/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
</IfModule>
