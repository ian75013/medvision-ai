chest_xray:
  seed: 42
  image_size: 224
  batch_size: 16
  epochs: 3
  learning_rate: 0.0005
  validation_split: 0.2

brain_mri:
  seed: 42
  image_size: 224
  batch_size: 16
  epochs: 10
  learning_rate: 0.0001
  validation_split: 0.2

dvc:
  chest_xray:
    raw_data_dir: data/raw/chest_xray
    model_path: artifacts/models/optimized_model.keras
    metrics_path: artifacts/reports/optimized_metrics.json
    history_path: artifacts/reports/optimized_history.json
  brain_mri:
    raw_data_dir: data/raw/brain_tumor_mri
    model_path: artifacts/models/brain_mri_optimized.keras
    metrics_path: artifacts/reports/brain_mri_metrics.json
    history_path: artifacts/reports/brain_mri_optimized_history.json
