chest_xray:
  seed: 42
  image_size: 224
  batch_size: 16
  epochs: 3
  learning_rate: 0.0005
  validation_split: 0.2

brain_mri:
  seed: 42
  image_size: 224
  batch_size: 16
  epochs: 10
  learning_rate: 0.0001
  validation_split: 0.2

brain_tumor_segmentation:
  seed: 42
  image_size: 256
  batch_size: 8
  epochs: 10
  learning_rate: 0.001
  validation_split: 0.2
  segmentation_loss_weight: 1.0
  classification_loss_weight: 0.4

chest_xray_segmentation:
  seed: 42
  image_size: 256
  batch_size: 8
  epochs: 10
  learning_rate: 0.001
  validation_split: 0.2
  segmentation_loss_weight: 1.0
  classification_loss_weight: 0.4

dvc:
  chest_xray:
    raw_data_dir: data/raw/chest_xray
    model_path: artifacts/models/optimized_model.keras
    metrics_path: artifacts/reports/optimized_metrics.json
  brain_mri:
    raw_data_dir: data/raw/brain_tumor_mri
    model_path: artifacts/models/brain_mri_optimized.keras
    metrics_path: artifacts/reports/brain_mri_metrics.json
  brain_tumor_segmentation:
    raw_data_dir: data/raw/brain_tumor_segmentation
    manifest_path: data/processed/brain_tumor_segmentation/manifest.csv
    model_path: artifacts/models/brain_tumor_segmentation_unet.keras
    metrics_path: artifacts/reports/brain_tumor_segmentation_unet_metrics.json
  chest_xray_segmentation:
    raw_data_dir: data/raw/chest_xray_segmentation
    manifest_path: data/processed/chest_xray_segmentation/manifest.csv
    model_path: artifacts/models/chest_xray_segmentation_unet.keras
    metrics_path: artifacts/reports/chest_xray_segmentation_unet_metrics.json
