services:
  nginx:
    image: nginx:latest
    ports:
      - "${NGINX_HTTP_BIND_IP:-127.0.0.1}:${NGINX_HTTP_HOST_PORT:-18080}:80"
      - "${NGINX_HTTPS_BIND_IP:-127.0.0.1}:${NGINX_HTTPS_HOST_PORT:-18443}:443"
    volumes:
      - ./deploy/reverse-proxy/nginx/medvision.conf:/etc/nginx/conf.d/medvision.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - streamlit
    restart: unless-stopped

  mlflow:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "pip install -r requirements.txt && mlflow ui --backend-store-uri ./mlruns --host 0.0.0.0 --port 5000"
    ports:
      - "${MLFLOW_BIND_IP:-0.0.0.0}:${MLFLOW_HOST_PORT:-5000}:5000"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_BIND_IP:-0.0.0.0}:${API_HOST_PORT:-8000}:8000"
    depends_on:
      - mlflow

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "${STREAMLIT_BIND_IP:-0.0.0.0}:${STREAMLIT_HOST_PORT:-8501}:8501"
    depends_on:
      - api
